[pytest]
testpaths = tests
addopts = -ra --strict-markers --tb=short
markers =
    live: hits the real ILMU + LangSmith APIs (skipped unless --runlive is passed)
    slow: integration test that runs the full graph
filterwarnings =
    ignore::DeprecationWarning:pydantic.*
    ignore::DeprecationWarning:langsmith.*
