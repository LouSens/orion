name: Nightly Live Regression

on:
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC daily
  workflow_dispatch: {}    # allow manual runs from the Actions tab

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run live integration suite
        env:
          ILMU_API_KEY: ${{ secrets.ILMU_API_KEY }}
          ILMU_BASE_URL: ${{ secrets.ILMU_BASE_URL }}
          ILMU_MODEL: ${{ secrets.ILMU_MODEL }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          LANGSMITH_PROJECT: ${{ secrets.LANGSMITH_PROJECT }}
          LANGSMITH_TRACING: "true"
        run: pytest -ra --runlive tests/integration/test_workflow_live.py
